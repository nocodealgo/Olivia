<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BOT_NAME}} Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --radius: 12px;
            --gap: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
        }

        .header .dot.connected {
            background: var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Canvas Grid */
        .canvas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: var(--gap);
            padding: var(--gap);
        }

        /* Widget Card */
        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
        }

        .widget-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .widget-header h3 {
            font-size: 13px;
            font-weight: 600;
            flex: 1;
        }

        .widget-header .close {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }

        .widget-header .close:hover {
            color: var(--red);
        }

        .widget-body {
            padding: 16px;
        }

        .widget-body canvas {
            max-width: 100%;
        }

        /* Table */
        .widget table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .widget th {
            text-align: left;
            padding: 8px 12px;
            background: rgba(88, 166, 255, 0.08);
            color: var(--accent);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .widget td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .widget tr:hover td {
            background: rgba(88, 166, 255, 0.04);
        }

        /* Form */
        .widget .form-group {
            margin-bottom: 14px;
        }

        .widget label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .widget input,
        .widget select,
        .widget textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .widget input:focus,
        .widget select:focus,
        .widget textarea:focus {
            border-color: var(--accent);
        }

        .widget .form-submit {
            padding: 8px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .widget .form-submit:hover {
            opacity: 0.9;
        }

        /* Code */
        .widget pre {
            background: var(--bg);
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .widget code {
            font-family: 'SF Mono', Menlo, monospace;
        }

        /* Metric */
        .metric-value {
            font-size: 32px;
            font-weight: 700;
        }

        .metric-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .trend-up {
            color: var(--green);
        }

        .trend-down {
            color: var(--red);
        }

        /* Progress */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.5s;
        }

        .progress-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 60px;
            right: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease;
            max-width: 360px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        .toast.success {
            border-color: var(--green);
        }

        .toast.error {
            border-color: var(--red);
        }

        .toast.warning {
            border-color: var(--orange);
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text);
        }
    </style>
</head>

<body>
    <div class="header">
        <span style="font-size:20px">🎨</span>
        <h1>{{BOT_NAME}} Canvas</h1>
        <div class="status">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">Connecting…</span>
            <span id="clientCount" style="margin-left:8px"></span>
        </div>
    </div>

    <div class="canvas" id="canvas">
        <div class="empty" id="emptyState">
            <h2>Live Canvas</h2>
            <p>Widgets will appear here when {{BOT_NAME}} pushes them.</p>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        let ws;
        const canvas = document.getElementById('canvas');
        const emptyState = document.getElementById('emptyState');
        const widgetEls = new Map();
        const chartInstances = new Map();

        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/canvas/ws`);

            ws.onopen = () => {
                document.getElementById('statusDot').className = 'dot connected';
                document.getElementById('statusText').textContent = 'Connected';
            };

            ws.onclose = () => {
                document.getElementById('statusDot').className = 'dot';
                document.getElementById('statusText').textContent = 'Disconnected';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                switch (msg.type) {
                    case 'canvas:state':
                        for (const w of msg.widgets) renderWidget(w);
                        break;
                    case 'widget:add':
                        renderWidget(msg.widget);
                        break;
                    case 'widget:update':
                        renderWidget(msg.widget);
                        break;
                    case 'widget:remove':
                        removeWidgetEl(msg.widgetId);
                        break;
                    case 'canvas:clear':
                        clearAll();
                        break;
                    case 'toast':
                        showToast(msg.message, msg.level || 'info');
                        break;
                }
                updateEmpty();
            };
        }

        function updateEmpty() {
            emptyState.style.display = widgetEls.size === 0 ? '' : 'none';
        }

        function removeWidgetEl(id) {
            const el = widgetEls.get(id);
            if (el) { el.remove(); widgetEls.delete(id); }
            if (chartInstances.has(id)) { chartInstances.get(id).destroy(); chartInstances.delete(id); }
        }

        function clearAll() {
            for (const [id] of widgetEls) removeWidgetEl(id);
            widgetEls.clear();
        }

        function renderWidget(w) {
            removeWidgetEl(w.id);
            const card = document.createElement('div');
            card.className = 'widget';
            if (w.position?.colSpan) card.style.gridColumn = `span ${w.position.colSpan}`;

            // Header
            const header = document.createElement('div');
            header.className = 'widget-header';
            header.innerHTML = `<h3>${esc(w.title || w.type)}</h3><button class="close" onclick="closeWidget('${w.id}')">✕</button>`;
            card.appendChild(header);

            // Body
            const body = document.createElement('div');
            body.className = 'widget-body';

            switch (w.type) {
                case 'html':
                    body.innerHTML = w.content || '';
                    break;
                case 'chart':
                    renderChart(body, w);
                    break;
                case 'table':
                    renderTable(body, w);
                    break;
                case 'form':
                    renderForm(body, w);
                    break;
                case 'markdown':
                    body.innerHTML = typeof marked !== 'undefined' ? marked.parse(w.content || '') : `<pre>${esc(w.content || '')}</pre>`;
                    break;
                case 'code':
                    body.innerHTML = `<pre><code>${esc(w.content || '')}</code></pre>`;
                    break;
                case 'progress':
                    const pct = w.data ? Math.round((w.data.value / w.data.max) * 100) : 0;
                    body.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label">${pct}% ${w.data?.label ? '— ' + esc(w.data.label) : ''}</div>`;
                    break;
                case 'metric':
                    const trend = w.data?.trend === 'up' ? '↑' : w.data?.trend === 'down' ? '↓' : '';
                    const trendClass = w.data?.trend === 'up' ? 'trend-up' : w.data?.trend === 'down' ? 'trend-down' : '';
                    body.innerHTML = `<div class="metric-value ${trendClass}">${esc(String(w.data?.value ?? ''))} ${trend}</div><div class="metric-label">${esc(w.data?.label || '')}</div>`;
                    break;
                case 'list':
                    const items = (w.data || []).map(i => `<li>${esc(String(i))}</li>`).join('');
                    body.innerHTML = `<ul style="padding-left:18px;line-height:1.8">${items}</ul>`;
                    break;
                case 'image':
                    body.innerHTML = `<img src="${esc(w.content || '')}" style="max-width:100%;border-radius:8px">`;
                    break;
            }

            card.appendChild(body);
            canvas.appendChild(card);
            widgetEls.set(w.id, card);
        }

        function renderChart(body, w) {
            const c = document.createElement('canvas');
            c.height = 220;
            body.appendChild(c);
            requestAnimationFrame(() => {
                const inst = new Chart(c, {
                    type: w.data?.type || 'bar',
                    data: { labels: w.data?.labels || [], datasets: w.data?.datasets || [] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#e6edf3' } } },
                        scales: { x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }, y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } } },
                        ...(w.data?.options || {}),
                    },
                });
                chartInstances.set(w.id, inst);
            });
        }

        function renderTable(body, w) {
            const cols = w.data?.columns || [];
            const rows = w.data?.rows || [];
            let html = '<table><thead><tr>';
            for (const c of cols) html += `<th>${esc(c.label)}</th>`;
            html += '</tr></thead><tbody>';
            for (const r of rows) {
                html += '<tr>';
                for (const c of cols) html += `<td>${esc(String(r[c.key] ?? ''))}</td>`;
                html += '</tr>';
            }
            html += '</tbody></table>';
            body.innerHTML = html;
        }

        function renderForm(body, w) {
            const form = w.data;
            let html = '<form onsubmit="return submitForm(event, this)" data-callback="' + (form?.callbackId || '') + '" data-widget="' + w.id + '">';
            for (const f of (form?.fields || [])) {
                html += `<div class="form-group"><label>${esc(f.label)}</label>`;
                if (f.type === 'textarea') {
                    html += `<textarea name="${esc(f.name)}" placeholder="${esc(f.placeholder || '')}">${esc(String(f.value || ''))}</textarea>`;
                } else if (f.type === 'select') {
                    html += `<select name="${esc(f.name)}">`;
                    for (const o of (f.options || [])) html += `<option value="${esc(o.value)}" ${o.value === f.value ? 'selected' : ''}>${esc(o.label)}</option>`;
                    html += '</select>';
                } else if (f.type === 'checkbox') {
                    html += `<input type="checkbox" name="${esc(f.name)}" ${f.value ? 'checked' : ''} style="width:auto">`;
                } else {
                    html += `<input type="${f.type || 'text'}" name="${esc(f.name)}" value="${esc(String(f.value || ''))}" placeholder="${esc(f.placeholder || '')}">`;
                }
                html += '</div>';
            }
            html += `<button type="submit" class="form-submit">${esc(form?.submitLabel || 'Submit')}</button></form>`;
            body.innerHTML = html;
        }

        function submitForm(e, form) {
            e.preventDefault();
            const fd = new FormData(form);
            const data = Object.fromEntries(fd.entries());
            ws.send(JSON.stringify({
                type: 'form:submit',
                widgetId: form.dataset.widget,
                callbackId: form.dataset.callback,
                data,
            }));
            showToast('Form submitted!', 'success');
            return false;
        }

        function closeWidget(id) {
            removeWidgetEl(id);
            updateEmpty();
        }

        function showToast(message, level) {
            const t = document.createElement('div');
            t.className = 'toast ' + level;
            t.textContent = message;
            document.getElementById('toasts').appendChild(t);
            setTimeout(() => t.remove(), 5000);
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        connect();
    </script>
</body>

</html>
