<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOT_NAME}} Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ───────────────────────── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  }
  header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a371f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .status {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  header .status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }

  /* ── Stats Grid ───────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; padding: 16px 20px;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .stat label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .stat .value.green { color: var(--green); }

  /* ── Controls ─────────────────────── */
  .controls {
    display: flex; gap: 10px; padding: 0 20px 16px;
  }
  .btn {
    flex: 1; padding: 10px 16px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface);
    color: var(--text); font-size: 13px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center;
    justify-content: center; gap: 6px;
  }
  .btn:hover { border-color: var(--accent); background: #1c2333; }
  .btn.active { border-color: var(--green); background: #0d2818; color: var(--green); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: #2d1214; }

  /* ── Chat ──────────────────────────── */
  .chat-container {
    flex: 1; display: flex; flex-direction: column;
    padding: 0 20px 16px; min-height: 0;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    gap: 8px; padding: 12px 0; min-height: 200px; max-height: 400px;
  }
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.45; word-wrap: break-word;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } }
  .msg.user {
    align-self: flex-end; background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start; background: var(--surface);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
  }
  .msg.bot .name { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
  .msg.typing {
    align-self: flex-start; background: var(--surface);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
    color: var(--muted);
  }
  .msg.typing span { animation: blink 1.4s infinite; }
  .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
  .msg.typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  /* ── Chat Input ───────────────────── */
  .chat-input {
    display: flex; gap: 8px;
  }
  .chat-input input {
    flex: 1; padding: 12px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 24px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .chat-input input:focus { border-color: var(--accent); }
  .chat-input input::placeholder { color: var(--muted); }
  .chat-input button {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, opacity 0.15s;
  }
  .chat-input button:hover { transform: scale(1.05); }
  .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-input button svg { width: 18px; height: 18px; fill: #fff; }
</style>
</head>
<body>
  <header>
    <div class="avatar">🤖</div>
    <h1>{{BOT_NAME}}</h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Online</span>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><label>Uptime</label><div class="value" id="uptime">—</div></div>
    <div class="stat"><label>Memory</label><div class="value" id="memory">—</div></div>
    <div class="stat"><label>Telegram</label><div class="value green" id="telegram">✓</div></div>
    <div class="stat"><label>WhatsApp</label><div class="value" id="whatsapp">—</div></div>
  </div>

  <div class="controls">
    <button class="btn" id="voiceBtn" onclick="toggleVoice()">🎤 Voice Wake</button>
    <button class="btn" id="overlayBtn" onclick="openOverlay()">💬 Talk Mode</button>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="messages">
      <div class="msg bot"><div class="name">{{BOT_NAME}}</div>Ready! Type a message below.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Ask {{BOT_NAME}} anything…" autocomplete="off"
             onkeydown="if (event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const SECRET = '';  // Set if WEBHOOK_SECRET is enabled

    // ── Status polling ──────────────────
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const s = await res.json();
        const h = Math.floor(s.uptime / 3600);
        const m = Math.floor((s.uptime % 3600) / 60);
        document.getElementById('uptime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
        document.getElementById('memory').textContent = `${s.memory.heapMB}MB`;
        document.getElementById('whatsapp').textContent = s.channels.whatsapp ? '✓' : '—';
        document.getElementById('whatsapp').className = 'value' + (s.channels.whatsapp ? ' green' : '');
        document.getElementById('statusDot').style.background = '#3fb950';
        document.getElementById('statusText').textContent = 'Online';

        // Voice wake button state
        const vBtn = document.getElementById('voiceBtn');
        if (s.voiceWake.enabled) {
          vBtn.classList.add('active');
          vBtn.textContent = '🎤 Voice: ON';
        } else {
          vBtn.classList.remove('active');
          vBtn.textContent = '🎤 Voice Wake';
        }
      } catch {
        document.getElementById('statusDot').style.background = '#f85149';
        document.getElementById('statusText').textContent = 'Offline';
      }
    }
    fetchStatus();
    setInterval(fetchStatus, 5000);

    // ── Chat ────────────────────────────
    const msgs = document.getElementById('messages');
    const input = document.getElementById('chatInput');

    function addMsg(text, type) {
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      if (type === 'bot') {
        div.innerHTML = '<div class="name">{{BOT_NAME}}</div>' + escapeHtml(text);
      } else if (type === 'typing') {
        div.innerHTML = '<span>●</span> <span>●</span> <span>●</span>';
      } else {
        div.textContent = text;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');
      const typing = addMsg('', 'typing');
      document.getElementById('sendBtn').disabled = true;

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (SECRET) headers['Authorization'] = 'Bearer ' + SECRET;
        const res = await fetch('/api/chat', {
          method: 'POST', headers,
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        typing.remove();
        addMsg(data.reply || data.error || 'No response', 'bot');
      } catch (err) {
        typing.remove();
        addMsg('Connection error: ' + err.message, 'bot');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    // ── Voice Wake ──────────────────────
    async function toggleVoice() {
      const headers = { 'Content-Type': 'application/json' };
      if (SECRET) headers['Authorization'] = 'Bearer ' + SECRET;
      await fetch('/api/voice/toggle', { method: 'POST', headers });
      fetchStatus();
    }

    // ── Talk Mode Overlay ───────────────
    function openOverlay() {
      window.open('/overlay', '{{BOT_NAME}} Talk', 'width=400,height=300,toolbar=no,menubar=no');
    }

    input.focus();
  </script>
</body>
</html>
